<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/src/assets/SYNC1.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sync</title>
  <style>
    #splash-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: white;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.5s ease-out;
    }

    #splash-screen.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .splash-logo {
      width: 240px;
      height: auto;
      max-width: 60vw;
    }

    @media (max-width: 768px) {
      .splash-logo {
        width: 160px;
      }
    }
  </style>
</head>

<body>
  <div id="splash-screen">
    <video src="/src/assets/reloader.webm" autoplay loop muted playsinline class="splash-logo"></video>
  </div>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
  <script>
    window.addEventListener('load', () => {
      const splashScreen = document.getElementById('splash-screen');
      setTimeout(() => {
        splashScreen.classList.add('fade-out');
        setTimeout(() => {
          splashScreen.style.display = 'none';
        }, 500);
      }, 2500);
    });
  </script>
</body>

</html>
